    <script>
      // FOUC prevention: apply theme before paint.
      // Must use the SAME localStorage keys as useTheme.js (auth_theme / app_theme)
      // so the inline script and the Vue runtime agree on the theme from the start.
      (function () {
        var isAuthRoute = window.location.pathname === '/login' ||
                          window.location.pathname === '/register';
        var key = isAuthRoute ? 'auth_theme' : 'app_theme';
        var theme = localStorage.getItem(key) || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
