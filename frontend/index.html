<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:,">
    <title>AgentIQ | Neural OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      // FOUC prevention: apply theme before paint.
      // Must use the SAME localStorage keys as useTheme.js (auth_theme / app_theme)
      // so the inline script and the Vue runtime agree on the theme from the start.
      (function () {
        var isAuthRoute = window.location.pathname === '/login' ||
                          window.location.pathname === '/register';
        var key = isAuthRoute ? 'auth_theme' : 'app_theme';
        var theme = localStorage.getItem(key) || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
